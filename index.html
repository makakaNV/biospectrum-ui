<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/src/assets/logo-mini.svg" type="image/svg+xml">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>Biospectrum</title>
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null, decodeURIComponent(p[1]));
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
